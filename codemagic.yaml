workflows:
  sample-workflow:
    name: iOS Simulator Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: agriconnect_v0

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Check Flutter project
        script: |
          flutter --version
          flutter pub get

      - name: Build iOS Simulator
        script: |
          # This command creates the actual .app file
          flutter build ios --debug --simulator

    artifacts:
      # These paths match the standard Flutter build output
      - build/ios/iphonesimulator/*.app
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - cyusaimpanochrispin@gmail.com
