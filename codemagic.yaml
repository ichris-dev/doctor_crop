workflows:
  sample-workflow:
    name: iOS Device Build (IPA)
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: agriconnect_v0

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build iOS Project
        script: |
          # Use 'ios' with 'no-codesign' to bypass the Apple Developer requirement
          flutter build ios --release --no-codesign

      - name: Create Manual IPA
        script: |
          # Manually package the app into an IPA format for Sideloadly
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload
          zip -vr Runner.ipa Payload

    artifacts:
      # This points directly to your newly created IPA file
      - build/ios/iphoneos/Runner.ipa

    publishing:
      email:
        recipients:
          - cyusaimpanochrispin@gmail.com
