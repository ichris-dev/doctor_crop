workflows:
  sample-workflow:
    name: iOS Device Build (IPA)
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: agriconnect_v0

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build iOS Project
        script: |
          # Build the release bundle
          flutter build ios --release --no-codesign

      - name: Create Manual IPA
        script: |
          # This creates the Payload folder and zips it into an .ipa file
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos && zip -r Runner.ipa Payload

    artifacts:
      # This updated path will find the manual IPA we just created
      - build/ios/iphoneos/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - cyusaimpanochrispin@gmail.com
