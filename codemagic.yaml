workflows:
  sample-workflow:
    name: iOS Device Build (IPA)
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: agriconnect_v0

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build iOS IPA
        script: |
          # This creates the .ipa file for your physical iPhone
          flutter build ios --release --no-codesign

    artifacts:
      # This path will find the IPA file you need for your iPhone
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - cyusaimpanochrispin@gmail.com
