workflows:
  sample-workflow:
    name: iOS Simulator Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: agriconnect_v0

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Check Flutter project
        script: |
          pwd
          ls -la
          test -f pubspec.yaml || (echo "pubspec.yaml not found" && exit 1)
          test -d ios || (echo "ios folder not found" && exit 1)
          flutter --version

      - name: Get Flutter packages
        script: |
          flutter pub get


    artifacts:
      - agriconnect_v0/build/ios/output/*.zip
      - agriconnect_v0/build/ios/iphonesimulator/Runner.app

    publishing:
      email:
        recipients:
          - cyusaimpanochrispin@gmail.com
